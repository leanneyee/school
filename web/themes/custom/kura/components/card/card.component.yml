"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Image card
group: Card
props:
  type: object
  required:
    - heading_text
    - orientation
    - style
  properties:
    style:
      type: string
      title: Style
      enum:
        - framed
        - full
        - media_bg
      meta:enum:
        framed: Framed
        full: Full width
        media_bg: "Background image"
      examples:
        - framed
    orientation:
      type: string
      title: Orientation
      description: "Not applicable when Style is set to Background image."
      enum:
        - vertical
        - horizontal
      meta:enum:
        vertical: Vertical
        horizontal: Horizontal
      examples:
        - vertical
    background:
      type: string
      title: Background
      description: "Not applicable when Style is set to Background image (always uses the brand deep colour)."
      enum:
        - default
        - accent
        - primary
        - inverted
      meta:enum:
        default: Default
        accent: Accent
        primary: Primary
        inverted: Inverted
      examples:
        - default
    heading_text:
      type: string
      title: Heading
      examples:
        - "This is your card title"
    level:
      type: number
      title: Heading level
      enum:
        - 2
        - 3
        - 4
      default: 3
      examples:
        - 3
    eyebrow_text:
      type: string
      title: Eyebrow
      description: "Small label displayed above the heading. Shown in brand sun colour on Overlay cards."
      examples:
        - "Years 0–2"
    url:
      type: string
      title: Link
      format: uri-reference
    media:
      $ref: json-schema-definitions://canvas.module/image
      title: Image
      type: object
      examples:
        - src: "assets/jj-ying-8bghKxNU1j0-unsplash.jpg"
          width: 1200
          height: 900
          alt: "Photo by jjying: https://unsplash.com/photos/purple-and-blue-light-digital-wallpaper-8bghKxNU1j0"
    text:
      type: string
      title: Description
      pattern: "(.|\\r?\\n)*"
      examples:
        - "Quaerat laborum rerum dolores dolores dolor qui."
    is_text_centered:
      type: boolean
      title: Center text
      examples:
        - false
