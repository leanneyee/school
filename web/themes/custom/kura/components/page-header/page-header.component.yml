$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Page Header
description: Breadcrumb, page title, and optional featured image for the top of content pages. The title and image columns sit side-by-side on medium screens and above.
group: Kura
status: stable
props:
