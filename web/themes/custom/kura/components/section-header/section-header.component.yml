$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Section Header
description: Eyebrow label, heading slot on the left and an optional CTA slot on the right. Uses container queries to switch from a stacked column to a side-by-side row with the CTA baseline-aligned to the bottom of the heading. Place in a Section component's header slot.
group: Kura
props:
  type: object
  required:
    - cta_align
  properties:
    cta_align:
      type: string
      title: CTA alignment
      description: "Vertical alignment of the Call to Action relative to the heading at wider screen sizes. No effect when the Call to Action slot is empty."
      enum:
        - top
        - middle
        - bottom
      meta:enum:
        top: Top
        middle: Middle
        bottom: Bottom
      default: bottom
      examples:
        - bottom
    cta_stack:
      type: boolean
      title: Stack CTAs
      description: "Display CTA slot items as a vertical column instead of wrapping horizontally."
      default: false
    eyebrow:
      type: string
      title: Eyebrow

slots:
  heading:
    title: Heading
    description: Heading component. Displays on the left.
  cta:
    title: Call to Action
    description: Button or link. Displays inline with the heading at wider container sizes.
