$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Footer Content
description: Labelled content block pre-styled for the dark site footer. Heading and rich text are both optional.
group: Kura
props:
  type: object
  properties:
    heading:
      type: string
      title: Heading
      examples:
        - Footer Heading
    content:
      type: string
      title: Content
      contentMediaType: text/html
      x-formatting-context: block
      examples:
        - <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
