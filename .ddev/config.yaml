type: drupal11
docroot: web
ddev_version_constraint: '>= 1.25.0'
hooks:
  post-start:
    - composer: install
    - composer: drupal:recipe-unpack
    - exec: "grep -qF 'config_sync_directory' /var/www/html/web/sites/default/settings.php || printf '%s\\n' \"\\$settings['config_sync_directory'] = '../config/sync';\" >> /var/www/html/web/sites/default/settings.php"
