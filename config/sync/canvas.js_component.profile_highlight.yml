    const Component = ({
      header,
      content,
      name,
      role,
      image,
      imagePosition
    }) => {
      return (
         <section className="w-full bg-white py-12">
          <div className="lg:max-w-8/10 mx-auto">
            <div className={`grid md:grid-cols-[1fr_auto] gap-8 lg:gap-12 items-center ${imagePosition === "left" ? "md:grid-cols-[auto_1fr]" : ""}`}>
              {/* Text Content */}
              <div className={`space-y-6 ${imagePosition === "left" ? "md:order-2" : ""}`}>
                <div className="space-y-5">
                  {header}
                </div>
                <div className="space-y-5 text-lg sm:text-xl text-gray-700 leading-relaxed">
                  <div className="space-y-5">
                    {content}
                  </div>
                  {name && (
                    <p className="space-y-5">
                      <strong>{name}</strong>
                      {role && <><br />{role}</>}
                    </p>
                   )}
                </div>
              </div>

              {/* Profile Photo - Circle */}
              {image && (
                <div className={imagePosition === "left" ? "md:order-1" : ""}>
                  <div className="@container relative w-64 h-64 mx-auto rounded-full overflow-hidden shadow-xl ring-4 ring-blue-100">
                    <div className="w-full h-full [&_img]:w-full [&_img]:h-full [&_img]:object-cover">
                      {image}
                    </div>
                  </div>
                </div>
               )}
            </div>
          </div>
        </section>
      );
    };

    export default Component;
